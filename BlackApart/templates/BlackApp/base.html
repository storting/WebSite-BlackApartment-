{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BlackApartment{% endblock %} - BlackApartment Novosibirsk</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/favicon.ico' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
    <script src="https://unpkg.com/feather-icons"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.net.min.js"></script>
    {% block extra_head %}{% endblock %}
</head>
<body class="bg-noir-50 min-h-screen flex flex-col">
    {% include 'BlackApp/includes/navbar.html' %}

    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    {% include 'BlackApp/includes/footer.html' %}

    <script src="{% static 'js/components/navbar.js' %}"></script>
    <script src="{% static 'js/components/footer.js' %}"></script>
    <script src="{% static 'js/script.js' %}"></script>
    <script>
        feather.replace();
    </script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
