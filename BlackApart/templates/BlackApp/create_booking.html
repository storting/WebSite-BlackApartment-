{% extends 'BlackApp/base.html' %}
{% load static %}

{% block title %}Бронирование{% endblock %}

{% block content %}
<div class="pt-24 container mx-auto px-4 max-w-md">
    <div class="bg-white rounded-2xl shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-4">Запрос на бронирование</h1>

        <!-- Красивый вывод ошибок и сообщений -->
        {% if messages %}
            {% for message in messages %}
                <div class="mb-4 p-3 rounded-lg 
                    {% if message.tags == 'error' %}bg-red-100 text-red-700 border border-red-200
                    {% elif message.tags == 'success' %}bg-green-100 text-green-700 border border-green-200
                    {% else %}bg-yellow-100 text-yellow-700 border border-yellow-200{% endif %}">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <p class="mb-4">Объект: 
            <a href="{% url 'apartment_detail' property.id %}" class="text-noir-900 underline hover:text-noir-700">
                {{ property.title }}
            </a>
        </p>

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label class="block text-sm font-medium text-noir-700 mb-1">Дата заезда</label>
                <input type="date" name="start_date" required 
                       class="w-full border border-noir-300 rounded-lg px-4 py-2 focus:border-noir-900 outline-none"
                       min="{{ today|date:'Y-m-d' }}">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-noir-700 mb-1">Дата выезда</label>
                <input type="date" name="end_date" required 
                       class="w-full border border-noir-300 rounded-lg px-4 py-2 focus:border-noir-900 outline-none"
                       min="{{ today|date:'Y-m-d' }}">
            </div>
            <div class="mb-4">
                <label class="block text-sm font-medium text-noir-700 mb-1">Сообщение (необязательно)</label>
                <textarea name="message" rows="4" 
                          class="w-full border border-noir-300 rounded-lg px-4 py-2 focus:border-noir-900 outline-none"
                          placeholder="Ваши пожелания..."></textarea>
            </div>
            <button type="submit" class="w-full bg-black text-white py-3 rounded-lg hover:bg-black transition">
                Отправить запрос
            </button>
        </form>
    </div>
</div>
{% endblock %}
