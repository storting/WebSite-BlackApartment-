{% extends 'BlackApp/base.html' %}
{% load static %}

{% block title %}Вход{% endblock %}

{% block content %}
<section class="py-20">
    <div class="container mx-auto px-4 max-w-md">
        <h1 class="text-4xl font-bold text-center mb-8 text-noir-900">LOGIN</h1>
        <div class="bg-white p-8 border border-noir-200 rounded-lg">
            <form method="post" action="{% url 'login' %}" class="space-y-6">
                {% csrf_token %}
                <div>
                    <label class="block text-sm font-medium text-noir-700 mb-2">Имя пользователя</label>
                    <input type="text" name="username" required class="w-full border border-noir-300 px-4 py-3 rounded">
                </div>
                <div>
                    <label class="block text-sm font-medium text-noir-700 mb-2">Пароль</label>
                    <input type="password" name="password" required class="w-full border border-noir-300 px-4 py-3 rounded">
                </div>
                <button type="submit" class="w-full bg-black text-white px-6 py-4 font-medium hover:bg-noir-800 transition-all rounded">ВОЙТИ</button>
                <div class="text-center">
                    <p class="text-noir-600">Нет аккаунта? <a href="{% url 'register_tenant' %}" class="text-noir-900 font-medium hover:underline">Зарегистрироваться</a></p>
                </div>
            </form>
        </div>
    </div>
</section>
{% endblock %}
